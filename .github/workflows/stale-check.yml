name: 🔍 停滞プロジェクト診断

on:
  schedule:
    # 毎週水曜 JST 9:00 = UTC 0:00
    - cron: '0 0 * * 3'
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run stale-check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print "/stale-checkコマンドを実行してください。20_Projects/roadmap.md を読み込み、open Issueの停滞状況（7日以上更新なし）を診断し、以下を実施してください: 1) 停滞Issue一覧（停滞日数・ブロッカー種別）をまとめる、2) 各停滞Issueのパターン診断（情報不足/外部依存/優先度低/技術的ブロック）を行う、3) 次アクション提案を生成する、4) 診断レポートを10_Journal/stale-check-$(date +'%Y-%m-%d').md に保存する。" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-turns 20

      - name: Git commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🔍 自動: 停滞チェック $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
