name: 📊 週次レビュー自動生成

on:
  schedule:
    # 毎週金曜 JST 18:00 = UTC 9:00
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run weekly-review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "/weekly-reviewコマンドを実行してください。00_Inbox/の未整理ファイル確認、過去7日のgit log集計、プロジェクト進捗確認、放置プロジェクト検出、週次レポート生成（10_Journal/weekly-$(date +'%Y-%m-%d').md）を行ってください。" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-turns 30

      - name: Git commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 自動: 週次レビュー $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
